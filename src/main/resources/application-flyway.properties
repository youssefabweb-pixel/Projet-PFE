# À utiliser avec MySQL 8+ (ou autre version supportée par Flyway Community) : migrations SQL + schéma validé par Hibernate.
# IntelliJ : Active profiles = flyway
# Ou variables : FLYWAY_ENABLED=true et JPA_DDL_AUTO=validate (voir application.properties)

spring.flyway.enabled=true
spring.jpa.hibernate.ddl-auto=validate

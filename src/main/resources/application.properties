server.port=${SERVER_PORT:8092  }
server.servlet.context-path=/stage_pfe
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=true
server.servlet.session.timeout=30m

spring.datasource.url=jdbc:mysql://localhost:3307/wifak_local_db1?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}

# Défaut local : pas de Flyway (MySQL 5.5 n'est pas supporté par Flyway Community). Hibernate met à jour le schéma depuis les entités.
# Avec MySQL 8+ et migrations versionnées : profil "flyway" OU FLYWAY_ENABLED=true + JPA_DDL_AUTO=validate.
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

spring.flyway.enabled=${FLYWAY_ENABLED:false}
spring.flyway.locations=classpath:db/migration


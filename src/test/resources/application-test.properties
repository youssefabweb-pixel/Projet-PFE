spring.datasource.url=jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# MySQL repair script (schema.sql) must not run against H2 / Flyway test schema.
spring.sql.init.mode=never

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

app.security.jwt-secret=ZmFrZV9kZXZfb25seV9zZWNyZXRfYmFzZTY0XzMyX2J5dGVzX18xMjM0NTY3ODkw
app.security.jwt-expiration-seconds=3600
app.security.enable-manager-init-endpoint=true

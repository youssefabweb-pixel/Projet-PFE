<div class="auth-wrapper">
  <div class="auth-card">
    <div class="brand"><img src="assets/brand/logo-wifak.jpg" alt="WIFAK BANK — بنك الوفاق" /></div>
    <h2>Forgot Password?</h2>
    <p>Enter your email and we will send reset instructions.</p>

    <form [formGroup]="form" (ngSubmit)="submit()">
      <label>Email <input type="email" formControlName="email" placeholder="johndoe@email.com" /></label>
      <button type="submit">Send reset link</button>
    </form>

    <p class="switch"><a routerLink="/login">Back to login</a></p>
    <p *ngIf="submitted" class="notice">Reset link simulation sent.</p>
  </div>
</div>
